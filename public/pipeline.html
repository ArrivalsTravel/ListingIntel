<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing Intel — Pipeline Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="wordmark">
    <span>Arrivals Collection</span>
    <span class="wordmark-dot"></span>
    <span>Pipeline Monitor</span>
  </div>
  <h1>Inspect the <em>pipeline</em></h1>
  <p>Debug extraction, reverse image search, filtering, and contact scraping step by step.</p>
</header>

<div class="search-card">
  <div class="input-group">
    <input
      id="url-input"
      class="url-input"
      type="url"
      placeholder="https://www.airbnb.com/rooms/12345 or image URL"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="btn-primary" id="search-btn" onclick="doSearch()">Analyse</button>
  </div>

  <div class="or-divider">or</div>
  <button class="btn-demo" onclick="doDemo()">Run demo with sample data →</button>

  <div class="api-notice" id="api-status">Checking connection…</div>
  <div style="margin-top:10px;font-size:12px;color:var(--muted)">
    <a href="/index.html" style="color:var(--orange);text-decoration:none">← Back to summary view</a>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Running pipeline…</p>
</div>

<div id="error-box"></div>
<div id="results" style="display:none; max-width: 920px; margin: 0 auto;"></div>

<script>
  const API = 'http://127.0.0.1:5000/api';

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      const serpOk = d.serpapi, visOk = d.vision;
      document.getElementById('api-status').innerHTML = `
        <span class="status-dot ${serpOk ? 'dot-green' : 'dot-red'}"></span>SerpApi ${serpOk ? 'connected' : 'not configured'}
        &nbsp;&nbsp;
        <span class="status-dot ${visOk ? 'dot-green' : 'dot-red'}"></span>Google Vision ${visOk ? 'connected' : 'not configured'}
      `;
    } catch(e) {
      document.getElementById('api-status').textContent = 'Could not reach API';
    }
  }
  checkHealth();

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const url = document.getElementById('url-input').value.trim();
    if (!url) {
      document.getElementById('url-input').focus();
      return;
    }
    const isAirbnbListing = url.includes('airbnb.') && url.includes('/rooms/');
    await runPipeline(isAirbnbListing ? { airbnb_url: url } : { image_url: url });
  }

  async function doDemo() {
    await runPipeline({ demo: true });
  }

  async function runPipeline(body) {
    setLoading(true);
    hideError();
    hideResults();

    try {
      const res = await fetch(`${API}/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });

      const data = await res.json();

      if (!res.ok || data.error) {
        showError(data.error || `Server error ${res.status}`);
        if (data.trace || data.image_url) renderResults(data);
        return;
      }

      renderResults(data);
    } catch (e) {
      showError('Could not reach the server. Please try again.');
    } finally {
      setLoading(false);
    }
  }

  function renderResults(data) {
    const trace = data.trace || {};
    const input = trace.input || {};
    const extract = trace.extract || {};
    const search = trace.search || {};
    const filter = trace.filter || {};
    const scrape = trace.scrape || {};
    const rawMatches = search.raw_matches || [];
    const hiddenMatches = filter.hidden_matches || [];
    const scrapeAttempts = scrape.attempts || [];
    const imageUrl = data.image_url || input.image_url || extract.image_url || '';

    const el = document.getElementById('results');

    el.innerHTML = `
      ${imageUrl && imageUrl !== 'demo' ? `
        <section class="search-image-wrap" style="max-width:920px">
          <div class="section-label">Image used</div>
          <div class="search-image-card">
            <img src="${escAttr(imageUrl)}" alt="Pipeline image" loading="lazy" />
          </div>
        </section>
      ` : ''}

      ${renderStageCard('Input / Extract', `
        ${kv('Input type', input.input_type || '—')}
        ${kv('Submitted URL', input.submitted_url || '—')}
        ${kv('Extract status', extract.status || '—')}
        ${kv('Extracted image URL', extract.image_url || imageUrl || '—')}
        ${extract.error ? kv('Extract error', extract.error) : ''}
      `)}

      ${renderStageCard('Search', `
        ${kv('Provider', search.provider || '—')}
        ${kv('Raw match count', String(search.raw_count || 0))}
        <div class="section-label" style="margin-top:18px">Raw matches</div>
        ${rawMatches.length ? renderMatchTable(rawMatches, true) : `<div style="color:var(--muted);font-size:13px">No raw matches</div>`}
      `)}

      ${renderStageCard('Filter', `
        ${kv('Shown count', String(filter.shown_count || 0))}
        ${kv('Hidden count', String(filter.hidden_count || 0))}
        <div class="section-label" style="margin-top:18px">Hidden matches</div>
        ${hiddenMatches.length ? renderHiddenTable(hiddenMatches) : `<div style="color:var(--muted);font-size:13px">No hidden matches</div>`}
      `)}

      ${renderStageCard('Scrape', `
        ${kv('Scrape attempts', String(scrapeAttempts.length))}
        <div class="section-label" style="margin-top:18px">Scrape results</div>
        ${scrapeAttempts.length ? renderScrapeCards(scrapeAttempts) : `<div style="color:var(--muted);font-size:13px">No scrape attempts</div>`}
      `)}
    `;

    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderStageCard(title, bodyHtml) {
    return `
      <section class="search-card pipeline-card">
        <div class="section-label">${title}</div>
        ${bodyHtml}
      </section>
    `;
  }

  function kv(label, value) {
    return `
      <div class="pipeline-kv">
        <div style="color:var(--muted)">${escHtml(label)}</div>
        <div style="word-break:break-word">${escHtml(value || '—')}</div>
      </div>
    `;
  }

  function renderMatchTable(rows, showSource) {
    return `
        <div class="pipeline-table-wrap">
            <table class="pipeline-table">
              <thead>
            <tr style="background:var(--dark)">
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Domain</th>
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Platform</th>
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Type</th>
              ${showSource ? `<th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Source</th>` : ''}
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Title</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td style="padding:10px;border-bottom:1px solid var(--border)"><a href="${escAttr(r.url)}" target="_blank" rel="noopener" style="color:var(--stone)">${escHtml(r.domain || '—')}</a></td>
                <td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.platform || '—')}</td>
                <td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.match_type || '—')}</td>
                ${showSource ? `<td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.source || '—')}</td>` : ''}
                <td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.title || '—')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderHiddenTable(rows) {
    return `
      <div style="overflow:auto;border:1px solid var(--border);border-radius:10px">
        <table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead>
            <tr style="background:var(--dark)">
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Domain</th>
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Platform</th>
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Type</th>
              <th style="text-align:left;padding:10px;border-bottom:1px solid var(--border)">Reason</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map(r => `
              <tr>
                <td style="padding:10px;border-bottom:1px solid var(--border)"><a href="${escAttr(r.url)}" target="_blank" rel="noopener" style="color:var(--stone)">${escHtml(r.domain || '—')}</a></td>
                <td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.platform || '—')}</td>
                <td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.match_type || '—')}</td>
                <td style="padding:10px;border-bottom:1px solid var(--border)">${escHtml(r.hidden_reason || '—')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderScrapeCards(rows) {
    return rows.map(r => `
        <div class="match-card pipeline-card-compact">
        <div class="match-body">
          <div class="match-top">
            <span class="match-domain"><a href="${escAttr(r.url)}" target="_blank" rel="noopener">${escHtml(r.domain || '—')}</a></span>
            ${r.platform ? `<span class="badge-platform">${escHtml(r.platform)}</span>` : ''}
            ${r.match_type ? `<span class="badge badge-unknown">${escHtml(r.match_type)}</span>` : ''}
          </div>
          ${r.title ? `<div class="match-title" style="white-space:normal">${escHtml(r.title)}</div>` : ''}
          ${r.emails && r.emails.length ? `<div class="match-contact" style="margin-top:8px">${r.emails.map(e => `<span class="contact-tag">✉ ${escHtml(e)}</span>`).join('')}</div>` : ''}
          ${r.phones && r.phones.length ? `<div class="match-contact" style="margin-top:8px">${r.phones.map(p => `<span class="contact-tag">↗ ${escHtml(p)}</span>`).join('')}</div>` : ''}
          ${r.error ? `<div style="margin-top:8px;color:#c07070;font-size:12px">${escHtml(r.error)}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  function setLoading(on) {
    document.getElementById('loading').style.display = on ? 'block' : 'none';
    document.getElementById('search-btn').disabled = on;
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  function hideResults() {
    document.getElementById('results').style.display = 'none';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function escAttr(s) {
    return escHtml(String(s)).replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
